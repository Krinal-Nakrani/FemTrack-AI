<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#2D0F52"/>
    </linearGradient>
    <linearGradient id="flower" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C94B8A"/>
      <stop offset="100%" stop-color="#FF6B9D"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Lotus petals -->
  <g transform="translate(256,260)">
    <ellipse cx="0" cy="-60" rx="35" ry="70" fill="url(#flower)" opacity="0.9" transform="rotate(0)"/>
    <ellipse cx="0" cy="-60" rx="35" ry="70" fill="url(#flower)" opacity="0.8" transform="rotate(36)"/>
    <ellipse cx="0" cy="-60" rx="35" ry="70" fill="url(#flower)" opacity="0.7" transform="rotate(72)"/>
    <ellipse cx="0" cy="-60" rx="35" ry="70" fill="url(#flower)" opacity="0.8" transform="rotate(-36)"/>
    <ellipse cx="0" cy="-60" rx="35" ry="70" fill="url(#flower)" opacity="0.7" transform="rotate(-72)"/>
    <ellipse cx="0" cy="-60" rx="30" ry="60" fill="#B39DDB" opacity="0.5" transform="rotate(18)"/>
    <ellipse cx="0" cy="-60" rx="30" ry="60" fill="#B39DDB" opacity="0.5" transform="rotate(-18)"/>
    <ellipse cx="0" cy="-60" rx="30" ry="60" fill="#B39DDB" opacity="0.4" transform="rotate(54)"/>
    <ellipse cx="0" cy="-60" rx="30" ry="60" fill="#B39DDB" opacity="0.4" transform="rotate(-54)"/>
    <circle cx="0" cy="0" r="20" fill="#FFD700" opacity="0.8"/>
  </g>
  <!-- Moon crescent -->
  <circle cx="380" cy="130" r="45" fill="#B39DDB" opacity="0.6"/>
  <circle cx="395" cy="120" r="38" fill="url(#bg)"/>
</svg>
